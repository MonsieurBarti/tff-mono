min_version: 2.0.0
assert_lefthook_installed: true

pre-commit:
  jobs:
    - name: branch-guard
      run: node scripts/hooks/branch-guard.mjs
    - name: oxlint-staged
      glob: "*.{ts,tsx,js,mjs,cjs}"
      exclude:
        - "apps/tff-cc/native/**"
        - "apps/tff-cc/assets/**"
        - "apps/tff-pi/.pi/**"
        - "apps/tff-pi/.hippo/**"
        - "apps/tff-pi/.superpowers/**"
      run: pnpm exec oxlint --deny-warnings {staged_files}
    - name: prettier-staged
      glob: "*.{ts,tsx,js,mjs,cjs,json,md,yml,yaml}"
      exclude:
        - "apps/tff-cc/native/**"
        - "apps/tff-cc/assets/**"
        - "apps/tff-pi/.pi/**"
        - "apps/tff-pi/.hippo/**"
        - "apps/tff-pi/.superpowers/**"
      run: pnpm exec prettier --check {staged_files}

commit-msg:
  jobs:
    - name: conventional-commit
      run: pnpm exec commitlint --edit "{1}"

pre-push:
  jobs:
    - name: verify
      run: pnpm verify
