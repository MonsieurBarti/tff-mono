min_version: 2.0.0
assert_lefthook_installed: true

pre-commit:
  jobs:
    - name: branch-guard
      run: node scripts/hooks/branch-guard.mjs

commit-msg:
  jobs:
    - name: conventional-commit
      run: pnpm exec commitlint --edit "{1}"

pre-push:
  jobs:
    - name: typecheck
      run: pnpm -w typecheck
